<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Login Form</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        
        .boxbody{
            margin: auto;
            padding: auto;
            text-align: center;
        }
        body {
            background-image: url('simon4.png');
            background-repeat: no-repeat;      /* Prevent tiling */
            background-size: cover;            /* Fill the background while keeping aspect ratio */
            background-position: center;       /* Center the image */
            background-attachment: fixed;      /* Optional: makes background fixed on scroll */
        }

 
        .box1{
            display: flex;
            justify-content: center;
            margin: 40px;
            
        }
        .innerbox{
            border: 3px solid black;
            border-radius: 10px;
            height: 100px;
            width: 100px;
            margin: 2rem;
        }

        .red{
            background-color:rgb(233, 120, 120);
            border-radius: 100px;
        }
        .yellow{
            background-color: rgb(246, 246, 0);
             border-radius: 100px;
        }

        .blue{
            background-color: blue;
             border-radius: 100px;
        }
        .green{
            background-color: rgb(64, 242, 103);
             border-radius: 100px;
        }

        .flash{
            background-color: #fff;
             border-radius: 100px;
        }

        .innerbox{
            font-size: 60px;
            line-height: 100px;
            font-weight: bold;
            color: black;
            user-select: none;
        }

        boxbody{
            padding-bottom:10px;
        }
        
    </style>
</head>
<body>
    <div>
      <div><h1 style="color: rgb(246, 244, 242); text-align: center;">Simon Says Game</h1></div>
      <div  style="justify-self: center;" class="login-container">
             <div class="box">
                 <div class="login-button-face login-header" style="width: 60%;">
                         <i class="fas fa-volume-up"></i>
                         <h3>PLAY GAME</h3>
                         <i class="fas fa-heart"></i>
                 </div>
                 
                 <div class="form-content">
                     <form>
                         <div class="boxbody">
                              <h2 style="color: #fff;"">Press any key to start the game</h2>
                             <div class="box1">
                                  <div class="line1">
                                       <div class="innerbox red" type="button"  id="red">1</div>
                                       <div class="innerbox yellow" type="button" id="yellow">2</div>
                                  </div>
                                  <div class="line2">
                                     <div class="innerbox green" type="button" id="green">3</div>
                                     <div class="innerbox blue" type="button" id="blue">4</div>
                                  </div>
                             </div>
                           </div>
                     </form>
                 </div>
             </div>
         </div>
    </div>
    <script src="12_simongame.js"></script>
</body>
</html>
